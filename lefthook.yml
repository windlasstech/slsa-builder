# Lefthook configuration for slsa-builder
# See docs/decisions/0011-use-lefthook-for-local-git-hook-orchestration.md
#
# After cloning, install hooks with:
#   lefthook install
#
# Local hooks are a developer feedback mechanism. They can be bypassed with
# `git commit --no-verify`, so CI and PR-level checks remain authoritative.

assert_lefthook_installed: true

commit-msg:
  jobs:
    - name: dco-signoff
      run: |
        set -euo pipefail
        if ! git interpret-trailers --parse < {1} | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
          echo
          echo "ERROR: Commit message is missing a valid Signed-off-by trailer (DCO)."
          echo "Please sign your commit with: git commit -s"
          echo
          exit 1
        fi

pre-commit:
  # Jobs run sequentially so formatters can fix files before linters check them.
  # Formatters use stage_fixed to re-stage any changes they make.
  jobs:
    # Formatters
    - name: prettier
      glob: "*.md"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

    - name: golangci-lint-fmt
      glob: "*.go"
      run: |
        set -euo pipefail
        pkgs=$(echo {staged_files} | xargs -r dirname | sort -u)
        [ -z "$pkgs" ] || golangci-lint fmt $pkgs
      stage_fixed: true

    - name: shfmt
      glob: "*.sh"
      run: shfmt -w {staged_files}
      stage_fixed: true

    # Linters
    - name: markdownlint
      glob: "*.md"
      run: pnpm exec markdownlint-cli2 {staged_files}

    - name: golangci-lint
      glob: "*.go"
      run: |
        set -euo pipefail
        pkgs=$(echo {staged_files} | xargs -r dirname | sort -u)
        if [ -n "$pkgs" ]; then
          golangci-lint run $pkgs
        fi

    - name: shellcheck
      glob: "*.sh"
      run: shellcheck {staged_files}

    - name: actionlint-yml
      files: git diff --cached --name-only --diff-filter=AM -- .github/workflows/
      glob: "*.yml"
      run: '[ -z "{files}" ] || actionlint {files}'

    - name: actionlint-yaml
      files: git diff --cached --name-only --diff-filter=AM -- .github/workflows/
      glob: "*.yaml"
      run: '[ -z "{files}" ] || actionlint {files}'
